# === TLS 指纹伪装（trojan 节点生效，SS 节点忽略）===
global-client-fingerprint: chrome

# === 网络优化：防止 AI 流式连接断开 ===
keep-alive-idle: 600
keep-alive-interval: 10
connection-idle-timeout: 600
tcp-concurrent: true
unified-delay: true
disable-keep-alive: false
buffer-size: 65536
ipv6: false

hosts:
  'mtalk.google.com': 108.177.125.188
  'services.googleapis.cn': 74.125.203.94
  'clientservices.googleapis.com': 142.250.80.42

profile:
  store-selected: true
  store-fake-ip: true
  tracing: true

dns!:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  cache-algorithm: arc
  prefer-h3: false
  respect-rules: true
  ipv6: false
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://1.1.1.1/dns-query
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  fake-ip-filter:
    # === AI 服务（需要真实 IP，不走 fake-ip）===
    - +.openai.com
    - +.chatgpt.com
    - +.oaistatic.com
    - +.oaiusercontent.com
    - +.anthropic.com
    - +.claude.ai
    - +.claude.com
    - +.claudeusercontent.com
    - +.ant.dev
    - +.googleapis.com
    - +.cursor.sh
    - +.cursor.com
    - +.github.com
    - +.githubcopilot.com
    - +.x.ai
    - +.grok.com
    - +.groq.com
    - +.cohere.com
    - +.mistral.ai
    # === 内网域名（TUN 模式下需要真实 DNS 解析才能 DIRECT）===
    - +.antfin.com
    - +.antfin-inc.com
    - +.alibaba-inc.com
    - +.alibaba.com
    - +.atatech.org
    - +.alipay.com
    - +.taobao.com
    - +.aliyun.com
    - +.aliyun-inc.com
    - +.aliyuncs.com
    - +.fliggy.com
    - +.yuque.com
    - +.dingtalk.com
    - +.dingtalkapps.com
    - +.dingtalk.net
    - +.alicdn.com
    - +.aliway.com
    - +.antgroup.com
    # === 游戏 / 设备（来自订阅，保留）===
    - "*.lan"
    - "*.srv.nintendo.net"
    - "*.stun.playstation.net"
    - xbox.*.microsoft.com
    - "*.xboxlive.com"

tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

sniffer:
  enable: false

+rules:
  # === Qoder 直连 ===
  - DOMAIN-SUFFIX,qoder.sh,DIRECT

  # === OpenAI / ChatGPT / Codex ===
