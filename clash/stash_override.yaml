name: AI Services & GitHub 路由规则
desc: AI 服务走美国节点，内网直连，DNS 优化
category: 'AI'

dns:
  enable: true
  ipv6: false
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

