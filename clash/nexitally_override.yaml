# === 网络优化：防止 AI 流式连接断开 ===
keep-alive-idle: 600
keep-alive-interval: 10
connection-idle-timeout: 600
tcp-concurrent: true
unified-delay: true
disable-keep-alive: false
buffer-size: 65536
ipv6: false

# === TUN: mixed 栈在 macOS 下 TCP 不通，改用 system ===
tun:
  stack: system
  dns-hijack:
    - "any:53"

hosts:
  'mtalk.google.com': 108.177.125.188
  'services.googleapis.cn': 74.125.203.94
  'clientservices.googleapis.com': 142.250.80.42

profile:
  store-selected: true
  store-fake-ip: true
  tracing: true

dns!:
  enable: true
  cache-algorithm: arc
  prefer-h3: false
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.local"
    - "*.home.arpa"
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
    - +.push.apple.com
    - swscan.apple.com
    - mesu.apple.com
    - stun.*.*
    - stun.*.*.*
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

